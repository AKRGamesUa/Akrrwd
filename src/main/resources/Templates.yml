# AkrRwd – Particle Templates
# All 6 templates are defined here and can be freely edited.
#
# Template fields:
#   style          – The spawn pattern. Available: burst, spiral, ring, rain, pillar, orbit
#   type           – Bukkit Particle enum name. Full list: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Particle.html
#   count          – Total number of particles to spawn (or per cycle for animated styles)
#   speed          – Extra speed / spread applied to each particle (0.0 = no drift)
#   radius         – Horizontal spread radius in blocks around the player
#   height         – Vertical centre / height offset in blocks
#   duration_ticks – (spiral & orbit only) How many server ticks the animation runs for. 20 ticks = 1 second.

templates:

  # ── 1. STAR BURST ─────────────────────────────────────────────────────────
  # A quick explosive sphere of golden stars that pops outward from the player.
  star_burst:
    style: burst
    type: END_ROD
    count: 80
    speed: 0.15
    radius: 1.2
    height: 1.0

  # ── 2. FLAME SPIRAL ───────────────────────────────────────────────────────
  # Fire traces a rising spiral above the player over ~2 seconds.
  flame_spiral:
    style: spiral
    type: FLAME
    count: 60
    speed: 0.0
    radius: 0.8
    height: 2.0
    duration_ticks: 40

  # ── 3. MAGIC RING ─────────────────────────────────────────────────────────
  # A flat ring of enchantment glyphs appears at mid-body height.
  magic_ring:
    style: ring
    type: ENCHANTMENT_TABLE
    count: 48
    speed: 0.05
    radius: 1.0
    height: 0.8

  # ── 4. SPARKLE RAIN ───────────────────────────────────────────────────────
  # Sparks fall gently down around the player like confetti.
  sparkle_rain:
    style: rain
    type: TOTEM
    count: 70
    speed: 0.02
    radius: 1.5
    height: 1.0

  # ── 5. SOUL PILLAR ────────────────────────────────────────────────────────
  # A column of soul-fire flames rises from the player's feet.
  soul_pillar:
    style: pillar
    type: SOUL_FIRE_FLAME
    count: 80
    speed: 0.0
    radius: 0.4
    height: 2.5

  # ── 6. ORBIT STARS ────────────────────────────────────────────────────────
  # Glowing dust particles orbit around the player for 3 seconds.
  orbit_stars:
    style: orbit
    type: CRIT_MAGIC
    count: 40
    speed: 0.04
    radius: 1.0
    height: 1.0
    duration_ticks: 60
